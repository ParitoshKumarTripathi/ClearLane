services:
  - type: web
    name: clearlane
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHONPATH
        value: /app/src
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
